<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبار المتوالية العددية</title>
<style>
:root{
  --bg:#0f1419;--card:#161d27;--card2:#1d2630;
  --green:#3dd9a8;--orange:#ff9f5a;
  --text:#eef2f5;--muted:#8b97a3;
  --red:#ff5c5c;--border:#2a3441;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Tahoma','Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

.bar{position:sticky;top:0;z-index:99;background:rgba(15,20,25,.97);border-bottom:1px solid var(--border);padding:11px 16px 9px;backdrop-filter:blur(6px);}
.bar-row{max-width:720px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.bar-title{font-size:14px;font-weight:800;color:var(--green);}
.clock{display:flex;align-items:center;gap:6px;font-weight:800;font-size:18px;font-variant-numeric:tabular-nums;background:var(--card2);padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);}
.clock.red{color:var(--red);border-color:var(--red);}
.prog-wrap{max-width:720px;margin:7px auto 0;}
.prog-track{height:7px;background:var(--card2);border-radius:4px;overflow:hidden;}
.prog-fill{height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--orange));transition:width .25s;}
.prog-txt{font-size:11px;color:var(--muted);margin-top:3px;text-align:left;}

.wrap{max-width:720px;margin:0 auto;padding:18px 14px 100px;}

.intro{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px 20px;text-align:center;}
.intro h1{color:var(--green);font-size:22px;margin-bottom:8px;}
.intro p{color:var(--muted);line-height:2;font-size:14px;}
.qb{display:flex;justify-content:center;gap:12px;margin:18px 0;flex-wrap:wrap;}
.qb-item{background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:9px 16px;text-align:center;font-size:13px;}
.qb-item b{display:block;font-size:19px;color:var(--orange);}
.fbox{background:rgba(61,217,168,.07);border:1px solid rgba(61,217,168,.2);border-radius:10px;padding:13px 16px;margin:14px 0;font-size:13.5px;line-height:2.3;direction:rtl;text-align:right;}
.fbox .f{color:var(--orange);font-size:14.5px;font-weight:800;}

.btn{background:var(--green);color:#04201a;border:none;padding:12px 26px;border-radius:28px;font-size:15px;font-weight:800;cursor:pointer;transition:transform .12s,box-shadow .12s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(61,217,168,.3);}
.btn.outline{background:transparent;color:var(--green);border:1.5px solid var(--green);}
.btn.danger{background:var(--red);color:#fff;}

.slbl{background:var(--card2);border-right:4px solid var(--orange);border-radius:9px;padding:10px 14px;margin:20px 0 10px;font-size:14px;font-weight:800;color:var(--orange);}

.qcard{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:16px 16px 13px;margin-bottom:11px;}
.qhead{display:flex;align-items:flex-start;gap:9px;margin-bottom:13px;}
.qn{background:var(--card2);color:var(--orange);font-weight:800;font-size:12px;border-radius:7px;padding:3px 9px;flex-shrink:0;border:1px solid var(--border);}
.qtxt{font-size:16px;line-height:1.9;direction:rtl;text-align:right;}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
@media(max-width:460px){.opts{grid-template-columns:1fr;}}
.opt{display:flex;align-items:center;gap:8px;background:var(--card2);border:1.5px solid var(--border);border-radius:9px;padding:10px 13px;cursor:pointer;direction:rtl;text-align:right;font-size:15.5px;font-weight:600;transition:border-color .12s,background .12s;}
.opt:hover{border-color:var(--green);}
.opt.sel{border-color:var(--green);background:rgba(61,217,168,.12);}
.ltr{width:24px;height:24px;border-radius:50%;background:var(--border);color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
.opt.sel .ltr{background:var(--green);color:#04201a;}

.sbar{position:fixed;bottom:0;left:0;right:0;background:rgba(15,20,25,.97);border-top:1px solid var(--border);padding:11px 14px;display:flex;justify-content:center;backdrop-filter:blur(6px);z-index:50;}
.sbar-inner{width:100%;max-width:400px;}
.sbar .btn{width:100%;}
.shint{font-size:11px;color:var(--muted);text-align:center;margin-top:4px;}

.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
.mbox{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:24px 20px;max-width:320px;text-align:center;}
.mbox p{line-height:1.9;margin-bottom:16px;font-size:15px;}
.mbtns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}

/* RESULTS */
.rcard{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px 18px;text-align:center;margin-bottom:16px;}
.ring{width:148px;height:148px;margin:0 auto 14px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:conic-gradient(var(--green) calc(var(--p,0)*1%),var(--card2) 0);position:relative;}
.ring::before{content:'';position:absolute;width:116px;height:116px;background:var(--card);border-radius:50%;}
.ring span{position:relative;font-size:30px;font-weight:900;color:var(--green);}
.rcard h2{font-size:19px;margin:6px 0 3px;}
.rsub{color:var(--muted);font-size:13px;}
.rstats{display:flex;justify-content:center;gap:12px;margin-top:16px;flex-wrap:wrap;}
.rst{background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:9px 16px;min-width:85px;text-align:center;}
.rst b{display:block;font-size:20px;}
.rst.c b{color:var(--green);}
.rst.w b{color:var(--red);}
.rst.t b{color:var(--orange);}

.rev-head{font-size:16px;font-weight:800;margin:22px 0 10px;color:var(--orange);}
.rq{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:12px;border-right:4px solid var(--border);}
.rq.ok{border-right-color:var(--green);}
.rq.no{border-right-color:var(--red);}
.rq-txt{font-size:15px;direction:rtl;text-align:right;line-height:1.8;margin-bottom:9px;}
.rrow{display:flex;align-items:center;gap:7px;font-size:13.5px;direction:rtl;margin-bottom:5px;flex-wrap:wrap;}
.tag{font-size:11px;font-weight:800;padding:2px 9px;border-radius:5px;flex-shrink:0;}
.tag.ok{background:rgba(61,217,168,.17);color:var(--green);}
.tag.no{background:rgba(255,92,92,.17);color:var(--red);}
.tag.ans{background:rgba(255,159,90,.15);color:var(--orange);}

/* SOLUTION BOX */
.sol-box{margin-top:10px;background:var(--card2);border:1px solid var(--border);border-radius:9px;overflow:hidden;}
.sol-toggle{width:100%;background:none;border:none;color:var(--green);font-size:13px;font-weight:800;padding:9px 14px;cursor:pointer;text-align:right;direction:rtl;display:flex;align-items:center;justify-content:space-between;}
.sol-toggle:hover{background:rgba(61,217,168,.06);}
.sol-arrow{transition:transform .2s;font-size:11px;}
.sol-toggle.open .sol-arrow{transform:rotate(180deg);}
.sol-steps{padding:0 14px;max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s;}
.sol-steps.open{max-height:400px;padding:0 14px 12px;}
.step-line{font-size:14px;line-height:2.2;direction:rtl;text-align:right;color:var(--text);}
.step-line .hl{color:var(--orange);font-weight:800;}
.step-line .ans-hl{color:var(--green);font-weight:800;font-size:15px;}
.step-sep{border:none;border-top:1px solid var(--border);margin:6px 0;}

.top-act{display:flex;justify-content:center;gap:12px;margin:20px 0 50px;flex-wrap:wrap;}
.hidden{display:none!important;}
</style>
</head>
<body>

<div class="bar" id="bar">
  <div class="bar-row">
    <div class="bar-title">📐 اختبار المتوالية العددية</div>
    <div class="clock" id="clk">⏱ <span id="clkTxt">30:00</span></div>
  </div>
  <div class="prog-wrap">
    <div class="prog-track"><div class="prog-fill" id="pf"></div></div>
    <div class="prog-txt" id="pt">0 / 20 تمت الإجابة</div>
  </div>
</div>

<div class="wrap">
  <div class="intro" id="intro">
    <h1>📐 اختبار المتوالية العددية</h1>
    <p>اختبار شامل على الحد العام ومجموع المتوالية<br>اقرأ كل سؤال واختر الإجابة الصحيحة</p>
    <div class="fbox">
      <span class="f">حـن = أ + (ن – 1) × د</span> &nbsp;← الحد العام<br>
      <span class="f">جـ = ن/2 × ( 2أ + (ن–1) × د )</span> &nbsp;← مجموع ن حد
    </div>
    <div class="qb">
      <div class="qb-item"><b>20</b>سؤال</div>
      <div class="qb-item"><b>30</b>دقيقة</div>
      <div class="qb-item"><b>∞</b>محاولات</div>
    </div>
    <button class="btn" onclick="start()">ابدأ الاختبار ▶</button>
  </div>
  <div id="quiz" class="hidden"></div>
  <div id="result" class="hidden"></div>
</div>

<div class="sbar hidden" id="sbar">
  <div class="sbar-inner">
    <button class="btn" onclick="askSubmit()">تسليم الاختبار وعرض النتيجة ✅</button>
    <div class="shint">يمكنك التمرير لمراجعة إجاباتك</div>
  </div>
</div>

<div class="moverlay hidden" id="modal">
  <div class="mbox">
    <p id="mtxt"></p>
    <div class="mbtns">
      <button class="btn danger" onclick="doSubmit()">تسليم الآن</button>
      <button class="btn outline" onclick="closeM()">رجوع</button>
    </div>
  </div>
</div>

<script>
const SECS=[
  {lbl:"📌 المتوالية: 5 ، 11 ، 17 ، 23 ، 29 ، ...    (أ = 5 ، د = 6)",from:0,to:3},
  {lbl:"📌 المتوالية: 90 ، 83 ، 76 ، 69 ، 62 ، ...    (أ = 90 ، د = −7)",from:4,to:7},
  {lbl:"📌 المتوالية: 2 ، 9 ، 16 ، 23 ، 30 ، ...    (أ = 2 ، د = 7)",from:8,to:11},
  {lbl:"📌 المتوالية: 4 ، 10 ، 16 ، 22 ، 28 ، ...    (أ = 4 ، د = 6)",from:12,to:15},
  {lbl:"📌 المتوالية: 1 ، 5 ، 9 ، 13 ، 17 ، ...    (أ = 1 ، د = 4)",from:16,to:19}
];

const Q=[
  // ── SEQ 1: a=5, d=6 ──
  {
    q:"في المتوالية العددية 5 ، 11 ، 17 ، 23 ، 29 ، ...\nالحد العاشر هو",
    opts:["95","59","65","53"], correct:1,
    sol:[
      "المعطيات: أ = 5 ، د = 6 ، ن = 10",
      "القانون: حـن = أ + (ن – 1) × د",
      "ح١٠ = 5 + (10 – 1) × 6",
      "ح١٠ = 5 + 9 × 6",
      "ح١٠ = 5 + 54",
      "✅ ح١٠ = 59"
    ]
  },
  {
    q:"في المتوالية العددية 5 ، 11 ، 17 ، 23 ، 29 ، ...\nالحد الخامس عشر هو",
    opts:["98","83","86","89"], correct:3,
    sol:[
      "المعطيات: أ = 5 ، د = 6 ، ن = 15",
      "القانون: حـن = أ + (ن – 1) × د",
      "ح١٥ = 5 + (15 – 1) × 6",
      "ح١٥ = 5 + 14 × 6",
      "ح١٥ = 5 + 84",
      "✅ ح١٥ = 89"
    ]
  },
  {
    q:"في المتوالية العددية 5 ، 11 ، 17 ، 23 ، 29 ، ...\nمجموع الحدود الثمانية الأولى هو",
    opts:["280","802","208","200"], correct:2,
    sol:[
      "المعطيات: أ = 5 ، د = 6 ، ن = 8",
      "القانون: جـ = ن/2 × (2أ + (ن – 1) × د)",
      "جـ٨ = 8/2 × (2×5 + 7×6)",
      "جـ٨ = 4 × (10 + 42)",
      "جـ٨ = 4 × 52",
      "✅ جـ٨ = 208"
    ]
  },
  {
    q:"في المتوالية العددية 5 ، 11 ، 17 ، 23 ، 29 ، ...\nمجموع الحدود العشرة الأولى هو",
    opts:["230","320","302","332"], correct:1,
    sol:[
      "المعطيات: أ = 5 ، د = 6 ، ن = 10",
      "القانون: جـ = ن/2 × (2أ + (ن – 1) × د)",
      "جـ١٠ = 10/2 × (2×5 + 9×6)",
      "جـ١٠ = 5 × (10 + 54)",
      "جـ١٠ = 5 × 64",
      "✅ جـ١٠ = 320"
    ]
  },
  // ── SEQ 2: a=90, d=-7 ──
  {
    q:"في المتوالية العددية 90 ، 83 ، 76 ، 69 ، 62 ، ...\nالحد الثاني عشر هو",
    opts:["13","31","17","7"], correct:0,
    sol:[
      "المعطيات: أ = 90 ، د = −7 ، ن = 12",
      "القانون: حـن = أ + (ن – 1) × د",
      "ح١٢ = 90 + (12 – 1) × (−7)",
      "ح١٢ = 90 + 11 × (−7)",
      "ح١٢ = 90 − 77",
      "✅ ح١٢ = 13"
    ]
  },
  {
    q:"في المتوالية العددية 90 ، 83 ، 76 ، 69 ، 62 ، ...\nالحد السابع هو",
    opts:["84","55","48","41"], correct:2,
    sol:[
      "المعطيات: أ = 90 ، د = −7 ، ن = 7",
      "القانون: حـن = أ + (ن – 1) × د",
      "ح٧ = 90 + (7 – 1) × (−7)",
      "ح٧ = 90 + 6 × (−7)",
      "ح٧ = 90 − 42",
      "✅ ح٧ = 48"
    ]
  },
  {
    q:"في المتوالية العددية 90 ، 83 ، 76 ، 69 ، 62 ، ...\nالحد السادس عشر هو",
    opts:["15","−8","−21","−15"], correct:3,
    sol:[
      "المعطيات: أ = 90 ، د = −7 ، ن = 16",
      "القانون: حـن = أ + (ن – 1) × د",
      "ح١٦ = 90 + (16 – 1) × (−7)",
      "ح١٦ = 90 + 15 × (−7)",
      "ح١٦ = 90 − 105",
      "✅ ح١٦ = −15"
    ]
  },
  {
    q:"في المتوالية العددية 90 ، 83 ، 76 ، 69 ، 62 ، ...\nمجموع الحدين الرابع والتاسع هو",
    opts:["301","130","133","103"], correct:3,
    sol:[
      "نحسب الحد الرابع: ح٤ = 90 + 3×(−7) = 90 − 21 = 69",
      "نحسب الحد التاسع: ح٩ = 90 + 8×(−7) = 90 − 56 = 34",
      "المجموع = ح٤ + ح٩",
      "المجموع = 69 + 34",
      "✅ المجموع = 103"
    ]
  },
  // ── SEQ 3: a=2, d=7 ──
  {
    q:"في المتوالية العددية 2 ، 9 ، 16 ، 23 ، 30 ، ...\nالحد العاشر هو",
    opts:["56","69","72","65"], correct:3,
    sol:[
      "المعطيات: أ = 2 ، د = 7 ، ن = 10",
      "القانون: حـن = أ + (ن – 1) × د",
      "ح١٠ = 2 + (10 – 1) × 7",
      "ح١٠ = 2 + 9 × 7",
      "ح١٠ = 2 + 63",
      "✅ ح١٠ = 65"
    ]
  },
  {
    q:"في المتوالية العددية 2 ، 9 ، 16 ، 23 ، 30 ، ...\nالحد الخامس عشر هو",
    opts:["100","107","93","110"], correct:0,
    sol:[
      "المعطيات: أ = 2 ، د = 7 ، ن = 15",
      "القانون: حـن = أ + (ن – 1) × د",
      "ح١٥ = 2 + (15 – 1) × 7",
      "ح١٥ = 2 + 14 × 7",
      "ح١٥ = 2 + 98",
      "✅ ح١٥ = 100"
    ]
  },
  {
    q:"في المتوالية العددية 2 ، 9 ، 16 ، 23 ، 30 ، ...\nمجموع الحدود العشرة الأولى هو",
    opts:["533","353","335","325"], correct:2,
    sol:[
      "المعطيات: أ = 2 ، د = 7 ، ن = 10",
      "القانون: جـ = ن/2 × (2أ + (ن – 1) × د)",
      "جـ١٠ = 10/2 × (2×2 + 9×7)",
      "جـ١٠ = 5 × (4 + 63)",
      "جـ١٠ = 5 × 67",
      "✅ جـ١٠ = 335"
    ]
  },
  {
    q:"في المتوالية العددية 2 ، 9 ، 16 ، 23 ، 30 ، ...\nمجموع الحدود الخمسة عشر الأولى هو",
    opts:["675","765","657","756"], correct:1,
    sol:[
      "المعطيات: أ = 2 ، د = 7 ، ن = 15",
      "القانون: جـ = ن/2 × (2أ + (ن – 1) × د)",
      "جـ١٥ = 15/2 × (2×2 + 14×7)",
      "جـ١٥ = 7.5 × (4 + 98)",
      "جـ١٥ = 7.5 × 102",
      "✅ جـ١٥ = 765"
    ]
  },
  // ── SEQ 4: a=4, d=6 ──
  {
    q:"في المتوالية العددية 4 ، 10 ، 16 ، 22 ، 28 ، ...\nالحد العاشر هو",
    opts:["85","52","64","58"], correct:3,
    sol:[
      "المعطيات: أ = 4 ، د = 6 ، ن = 10",
      "القانون: حـن = أ + (ن – 1) × د",
      "ح١٠ = 4 + (10 – 1) × 6",
      "ح١٠ = 4 + 9 × 6",
      "ح١٠ = 4 + 54",
      "✅ ح١٠ = 58"
    ]
  },
  {
    q:"في المتوالية العددية 4 ، 10 ، 16 ، 22 ، 28 ، ...\nالحد الثاني عشر هو",
    opts:["70","76","64","58"], correct:0,
    sol:[
      "المعطيات: أ = 4 ، د = 6 ، ن = 12",
      "القانون: حـن = أ + (ن – 1) × د",
      "ح١٢ = 4 + (12 – 1) × 6",
      "ح١٢ = 4 + 11 × 6",
      "ح١٢ = 4 + 66",
      "✅ ح١٢ = 70"
    ]
  },
  {
    q:"في المتوالية العددية 4 ، 10 ، 16 ، 22 ، 28 ، ...\nالفرق بين الحد العاشر والرابع هو",
    opts:["63","36","30","42"], correct:1,
    sol:[
      "نحسب الحد العاشر: ح١٠ = 4 + 9×6 = 4 + 54 = 58",
      "نحسب الحد الرابع:  ح٤  = 4 + 3×6 = 4 + 18 = 22",
      "الفرق = ح١٠ − ح٤",
      "الفرق = 58 − 22",
      "✅ الفرق = 36"
    ]
  },
  {
    q:"في المتوالية العددية 4 ، 10 ، 16 ، 22 ، 28 ، ...\nمجموع الحدود الثمانية الأولى هو",
    opts:["192","208","200","220"], correct:2,
    sol:[
      "المعطيات: أ = 4 ، د = 6 ، ن = 8",
      "القانون: جـ = ن/2 × (2أ + (ن – 1) × د)",
      "جـ٨ = 8/2 × (2×4 + 7×6)",
      "جـ٨ = 4 × (8 + 42)",
      "جـ٨ = 4 × 50",
      "✅ جـ٨ = 200"
    ]
  },
  // ── SEQ 5: a=1, d=4 ──

    q:"في المتوالية العددية 1 ، 5 ، 9 ، 13 ، 17 ، ...\nالحد الثامن هو",
    opts:["92","25","29","33"], correct:2,

      "ح٨ = 1 + (8 – 1) × 4",
      "ح٨ = 1 + 7 × 4",
      "ح٨ = 1 + 28",
      "✅ ح٨ = 29"
    ]
  },
  {
    q:"في المتوالية العددية 1 ، 5 ، 9 ، 13 ، 17 ، ...\nالحد الثاني عشر هو",
    opts:["54","45","41","49"], correct:1,
    sol:[
      "المعطيات: أ = 1 ، د = 4 ، ن = 12",
      "القانون: حـن = أ + (ن – 1) × د",
      "ح١٢ = 1 + (12 – 1) × 4",
      "ح١٢ = 1 + 11 × 4",
      "ح١٢ = 1 + 44",
      "✅ ح١٢ = 45"
    ]
  },
  {
    q:"في المتوالية العددية 1 ، 5 ، 9 ، 13 ، 17 ، ...\nمجموع الحدود العشرة الأولى هو",
    opts:["190","910","180","200"], correct:0,
    sol:[
      "المعطيات: أ = 1 ، د = 4 ، ن = 10",
      "القانون: جـ = ن/2 × (2أ + (ن – 1) × د)",
      "جـ١٠ = 10/2 × (2×1 + 9×4)",
      "جـ١٠ = 5 × (2 + 36)",
      "جـ١٠ = 5 × 38",
      "✅ جـ١٠ = 190"
    ]
  },
  {
    q:"في المتوالية العددية 1 ، 5 ، 9 ، 13 ، 17 ، ...\nمجموع الحدين الثالث والسابع هو",
    opts:["43","38","30","34"], correct:3,
    sol:[
      "نحسب الحد الثالث:  ح٣ = 1 + 2×4 = 1 + 8  = 9",
      "نحسب الحد السابع:  ح٧ = 1 + 6×4 = 1 + 24 = 25",
      "المجموع = ح٣ + ح٧",
      "المجموع = 9 + 25",
      "✅ المجموع = 34"
    ]
  }
];

const TOTAL=30*60;
let left=TOTAL, ticker=null, ans=new Array(Q.length).fill(null), going=false;

function start(){
  going=true;
  document.getElementById('intro').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  document.getElementById('sbar').classList.remove('hidden');
  render(); tick();
}

function render(){
  const w=document.getElementById('quiz');
  w.innerHTML='';
  const L=['أ','ب','جـ','د'];
  let si=0;
  Q.forEach((item,qi)=>{
    if(si<SECS.length&&qi===SECS[si].from){
      const s=document.createElement('div');
      s.className='slbl'; s.textContent=SECS[si].lbl;
      w.appendChild(s); si++;
    }
    const c=document.createElement('div');
    c.className='qcard'; c.id='qc'+qi;
    c.innerHTML=`
      <div class="qhead">
        <div class="qn">${qi+1}</div>
        <div class="qtxt">${item.q.replace(/\n/g,'<br>')}</div>
      </div>
      <div class="opts">
        ${item.opts.map((o,oi)=>`
          <div class="opt" id="o${qi}_${oi}" onclick="pick(${qi},${oi})">
            <div class="ltr">${L[oi]}</div><span>${o}</span>
          </div>`).join('')}
      </div>`;
    w.appendChild(c);
  });
}

function pick(qi,oi){
  ans[qi]=oi;
  for(let i=0;i<4;i++){
    const e=document.getElementById(`o${qi}_${i}`);
    if(e) e.classList.toggle('sel',i===oi);
  }
  const d=ans.filter(a=>a!==null).length;
  document.getElementById('pf').style.width=Math.round(d/Q.length*100)+'%';
  document.getElementById('pt').textContent=`${d} / ${Q.length} تمت الإجابة`;
}

function tick(){
  showTime();
  ticker=setInterval(()=>{ left--; showTime(); if(left<=0){clearInterval(ticker);finish(true);} },1000);
}
function showTime(){
  const m=String(Math.floor(left/60)).padStart(2,'0');
  const s=String(left%60).padStart(2,'0');
  document.getElementById('clkTxt').textContent=`${m}:${s}`;
  document.getElementById('clk').classList.toggle('red',left<=120);
}

function askSubmit(){
  const un=ans.filter(a=>a===null).length;
  if(un>0){
    document.getElementById('mtxt').textContent=`لم تجب على ${un} سؤال بعد. هل تريد التسليم الآن؟`;
    document.getElementById('modal').classList.remove('hidden');
  } else doSubmit();
}
function closeM(){document.getElementById('modal').classList.add('hidden');}
function doSubmit(){closeM();finish(false);}

function finish(timeUp){
  if(ticker) clearInterval(ticker);
  ['quiz','sbar','bar','modal'].forEach(id=>document.getElementById(id).classList.add('hidden'));
  showResult(timeUp);
}

function toggleSol(id){
  const steps=document.getElementById('sol-steps-'+id);
  const btn=document.getElementById('sol-btn-'+id);
  const open=steps.classList.toggle('open');
  btn.classList.toggle('open',open);
  btn.querySelector('.sol-arrow').textContent=open?'▲':'▼';
}

function showResult(timeUp){
  let cor=0;
  Q.forEach((item,qi)=>{if(ans[qi]===item.correct)cor++;});
  const wr=Q.length-cor, pct=Math.round(cor/Q.length*100);
  const used=TOTAL-left, mu=Math.floor(used/60), su=used%60;
  let grade='يحتاج مزيداً من المراجعة 💪';
  if(pct===100) grade='ممتاز تماماً! 🌟🎉';
  else if(pct>=90) grade='ممتاز! 🌟';
  else if(pct>=75) grade='جيد جداً! 👏';
  else if(pct>=60) grade='جيد، واصل التدريب 🙂';

  const L=['أ','ب','جـ','د'];
  let rev='';
  Q.forEach((item,qi)=>{
    const u=ans[qi], ok=u===item.correct;
    const stepsHtml=item.sol.map((line,i)=>{
      const isLast=i===item.sol.length-1;
      return `<div class="step-line" style="${isLast?'color:var(--green);font-weight:800;font-size:15px;':''}">
        ${i>0&&!isLast?'<span style="color:var(--muted);margin-left:4px;">↓</span>':''} ${line}
      </div>${i<item.sol.length-2?'':''}`;
    }).join('');
    rev+=`
    <div class="rq ${ok?'ok':'no'}">
      <div class="rq-txt"><b>${qi+1}.</b> ${item.q.replace(/\n/g,'<br>')}</div>
      <div class="rrow">
        <span class="tag ${ok?'ok':'no'}">${ok?'✓ صحيح':'✗ خطأ'}</span>
        <span>إجابتك: ${u!==null?L[u]+') '+item.opts[u]:'لم تجب'}</span>
      </div>
      ${!ok?`<div class="rrow"><span class="tag ans">الصحيحة</span><span>${L[item.correct]}) ${item.opts[item.correct]}</span></div>`:''}
      <div class="sol-box"><div class="sol-steps open">${stepsHtml}</div></div>
    </div>`;
  });

  const sc=document.getElementById('result');
  sc.classList.remove('hidden');
  sc.innerHTML=`
  <div class="rcard">
    ${timeUp?'<p style="color:var(--red);font-weight:700;margin-bottom:10px;">⏰ انتهى الوقت</p>':''}
    <div class="ring" style="--p:${pct}"><span>${pct}%</span></div>
    <h2>${grade}</h2>
    <div class="rsub">درجتك: ${cor} من ${Q.length}</div>
    <div class="rstats">
      <div class="rst c"><b>${cor}</b>صحيح</div>
      <div class="rst w"><b>${wr}</b>خطأ</div>
      <div class="rst t"><b>${mu}:${String(su).padStart(2,'0')}</b>الوقت</div>
    </div>
  </div>
  <div class="rev-head">📋 تصحيح الإجابات – اضغط على "طريقة الحل" لكل سؤال</div>
  ${rev}
  <div class="top-act">
    <button class="btn" onclick="location.reload()">🔁 إعادة المحاولة</button>
  </div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

window.addEventListener('beforeunload',e=>{
  if(going&&document.getElementById('result').classList.contains('hidden')){
    e.preventDefault();e.returnValue='';
  }
});
</script>
</body>
</html>
